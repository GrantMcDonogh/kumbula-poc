{{define "content"}}
<div class="auth-card">
    <div class="auth-brand">
        <div class="brand-mark">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 2h2v5l4-5h2.5L7 8l4.5 6H9L5.5 9.5 5 10v4H3V2z"/>
            </svg>
        </div>
        <div class="brand-text">
            <span class="brand-name">KumbulaCloud</span>
            <span class="brand-tagline">Platform as a Service</span>
        </div>
    </div>
    <h2>Create your account</h2>
    {{if .Error}}
    <div class="error-msg">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/signup">
        <input type="hidden" name="_csrf" value="{{.CSRF}}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus
               pattern="[a-z][a-z0-9-]{1,48}[a-z0-9]" title="Lowercase letters, numbers, hyphens. 3-50 chars."
               placeholder="your-username">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" placeholder="min 8 characters">
        <button type="submit">Create account</button>
    </form>
    <p>Already have an account? <a href="/login">Log in</a></p>
</div>
{{end}}
