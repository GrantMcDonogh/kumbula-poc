{{define "content"}}
<div class="auth-card">
    <div class="auth-brand">
        <div class="brand-mark">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 2h2v5l4-5h2.5L7 8l4.5 6H9L5.5 9.5 5 10v4H3V2z"/>
            </svg>
        </div>
        <div class="brand-text">
            <span class="brand-name">KumbulaCloud</span>
            <span class="brand-tagline">Platform as a Service</span>
        </div>
    </div>
    <h2>Log in</h2>
    {{if .Error}}
    <div class="error-msg">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/login">
        <input type="hidden" name="_csrf" value="{{.CSRF}}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus placeholder="your-username">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="your-password">
        <button type="submit">Log in</button>
    </form>
    <p>Don't have an account? <a href="/signup">Sign up</a></p>
</div>
{{end}}
