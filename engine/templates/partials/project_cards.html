{{define "project_cards"}}
{{if .Projects}}
<div class="project-grid">
    {{range .Projects}}
    <article class="project-card">
        <header>
            <a href="/projects/{{.Name}}"><strong>{{.Name}}</strong></a>
            <span class="{{.Status | statusClass}}">
                <span class="status-dot"></span>
                <small>{{.Status}}</small>
            </span>
        </header>
        <p><a href="{{.URL}}" target="_blank">{{.URL}}</a></p>
        <footer>
            <small>Updated {{.UpdatedAt.Format "Jan 02, 15:04"}}</small>
        </footer>
    </article>
    {{end}}
</div>
{{else}}
<article style="text-align:center; padding: 3rem">
    <p style="font-size: 3rem; margin-bottom: 0.5rem">&#x1f680;</p>
    <h3>No projects yet</h3>
    <p>Create your first project to get started.</p>
    <a href="/projects/new" role="button">New Project</a>
</article>
{{end}}
{{end}}
